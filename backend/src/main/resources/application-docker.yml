spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:db}:${POSTGRES_PORT:5432}/${POSTGRES_DB:homelens}
    username: ${POSTGRES_USER:homelens}
    password: ${POSTGRES_PASSWORD:homelens}
    driver-class-name: org.postgresql.Driver

mybatis:
  mapper-locations: classpath*:mappers/**/*.xml
  type-aliases-package: com.homelens.model
  configuration:
    map-underscore-to-camel-case: true

semantic:
  api:
    base-url: ${SEMANTIC_API_BASE_URL:http://semantic-api:8000}


mail:
  sender:
    email: ${MAIL_SENDER_EMAIL:}
    password: ${MAIL_APP_PASSWORD:}

app:
  verify-base-url: ${APP_VERIFY_BASE_URL:http://localhost}
