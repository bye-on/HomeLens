spring.application.name=homelens

server.port=80

spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/homelens?serverTimezone=UTC
spring.datasource.username=homelens
spring.datasource.password=homelens

spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=600000
#spring.datasource.hikari.data-source-properties.profileSQL=true

spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=20000

mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl


#spring.datasource.hikari.data-source-properties.cachePrepStmts=true
#spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
#spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048
#spring.datasource.hikari.data-source-properties.useServerPrepStmts=true
#spring.datasource.hikari.data-source-properties.useLocalSessionState=true
#spring.datasource.hikari.data-source-properties.rewriteBatchedStatements=true
#spring.datasource.hikari.data-source-properties.cacheResultSetMetadata=true
#spring.datasource.hikari.data-source-properties.cacheServerConfiguration=true
#spring.datasource.hikari.data-source-properties.elideSetAutoCommits=true
#spring.datasource.hikari.data-source-properties.maintainTimeStats=false

# logging level
logging.level.root=info
logging.level.com.ssafy=trace
logging.level.com.ssafy.test=debug

# MyBatis setting
mybatis.type-aliases-package=com.homelens.model
mybatis.mapper-locations=mappers/*.xml

# JWT token key
ssafy.jwt.access-expmin=1
# refresh token 만료 시간: 일반적으로 1일~몇달
ssafy.jwt.refresh-expmin=1209600000

# Semantic/FastAPI endpoint
semantic.api.base-url=${SEMANTIC_API_BASE_URL:http://localhost:8000}

# Mail
mail.sender.email=${MAIL_SENDER_EMAIL:}
mail.sender.password=${MAIL_APP_PASSWORD:}
app.verify-base-url=${APP_VERIFY_BASE_URL:http://localhost}
