services:
  db:
    image: pgvector/pgvector:pg16
    container_name: homelens-postgres
    command: ["postgres", "-c", "maintenance_work_mem=256MB"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-homelens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-homelens}
      POSTGRES_DB: ${POSTGRES_DB:-homelens}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
      - ./backend/docker/postgres/dumps:/dump
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-homelens} -d ${POSTGRES_DB:-homelens}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - homelens-net

  db-restore:
    image: pgvector/pgvector:pg16
    profiles: ["restore"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-homelens}
      POSTGRES_USER: ${POSTGRES_USER:-homelens}
      POSTGRES_DB: ${POSTGRES_DB:-homelens}
    volumes:
      - ./backend/docker/postgres/dumps:/dump:ro
    command:
      - bash
      - -lc
      - >
        set -euo pipefail;
        echo "[restore] start";
        ls -al /dump/homelens.dump;
        pg_restore -h db -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" --clean --if-exists --no-owner --no-privileges /dump/homelens.dump;
        echo "[restore] done";
    networks:
      - homelens-net

  semantic-api:
    build:
      context: ./backend/app
    container_name: homelens-semantic-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-homelens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-homelens}
      POSTGRES_DB: ${POSTGRES_DB:-homelens}
      GMS_KEY: ${GMS_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    networks:
      - homelens-net

  backend:
    build:
      context: ./backend
    container_name: homelens-backend
    depends_on:
      db:
        condition: service_healthy
      semantic-api:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-homelens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-homelens}
      POSTGRES_DB: ${POSTGRES_DB:-homelens}
      SEMANTIC_API_BASE_URL: http://semantic-api:8000
      MAIL_SENDER_EMAIL: ${MAIL_SENDER_EMAIL:-}
      MAIL_APP_PASSWORD: ${MAIL_APP_PASSWORD:-}
      APP_VERIFY_BASE_URL: ${APP_VERIFY_BASE_URL:-http://localhost}
    expose:
      - "80"
    networks:
      - homelens-net

  frontend:
    build:
      context: ./frontend
    container_name: homelens-frontend
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"
    networks:
      - homelens-net

volumes:
  pgdata:

networks:
  homelens-net:
    driver: bridge
